<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Stream Without Limits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">ICCI FREE</div>
        <div class="nav-links">
            <a href="#" class="login-btn">Login</a>
        </div>
    </nav>

    <main>
        <div class="hero">
            <h1>Finalmente puoi dire<br><span class="highlight">quello che pensi</span></h1>
            <p>Niente censure stupide. Niente shadow ban. Solo libertà di parola.</p>
            
            <div class="cta-buttons">
                <button class="primary-btn">Inizia a Streammare</button>
                <button class="secondary-btn">Guarda Live</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="number">0</span>
                    <span class="label">Streamer Live</span>
                </div>
                <div class="stat">
                    <span class="number">∞</span>
                    <span class="label">Parole Libere</span>
                </div>
                <div class="stat">
                    <span class="number">100%</span>
                    <span class="label">No Censura</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>ICCI FREE © 2025 - Speak Your Mind</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
