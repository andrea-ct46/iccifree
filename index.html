<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Stream Without Limits</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">ICCI FREE</div>
        <div class="nav-links">
            <!-- MODIFICA 1: Aggiunto un ID per poterlo controllare con JS -->
            <a href="/auth.html" class="login-btn" id="navLoginBtn">Login</a>
        </div>
    </nav>

    <main>
        <div class="hero">
            <h1>Finalmente puoi dire<br><span class="highlight">quello che pensi</span></h1>
            <p>Niente censure stupide. Niente shadow ban. Solo libertà di parola.</p>
            
            <div class="cta-buttons">
                <!-- MODIFICA 2: Trasformato il bottone in un link con ID -->
                <a href="/auth.html" class="primary-btn" id="heroCtaBtn">Inizia a Streammare</a>
                <a href="/dashboard.html" class="secondary-btn">Guarda Live</a>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="number">0</span>
                    <span class="label">Streamer Live</span>
                </div>
                <div class="stat">
                    <span class="number">∞</span>
                    <span class="label">Parole Libere</span>
                </div>
                <div class="stat">
                    <span class="number">100%</span>
                    <span class="label">No Censura</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>ICCI FREE © 2025 - Speak Your Mind</p>
    </footer>

    <!-- MODIFICA 3: Cambiati gli script per caricare Supabase e la nostra logica -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
