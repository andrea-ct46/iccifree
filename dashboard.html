<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #00FF00; margin-bottom: 20px; }
        h1 { color: #00FF00; }
        p { font-size: 18px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #00FF00; border: none; font-weight: bold; border-radius: 8px;}
        .loading { font-size: 24px; }
        .error-box { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 8px; border: 1px solid #ff4444; }
        .error-box p { font-size: 16px; }
        .error-message { color: #ff4444; font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>

    <div id="loadingState">
        <h1 class="loading">Verifica profilo in corso...</h1>
    </div>

    <div id="dashboardContent" style="display: none;">
        <img id="avatarDisplay" src="https://placehold.co/100x100/121212/FFFFFF?text=PIC" alt="Foto Profilo" class="profile-pic">
        <h1>Benvenuto su ICCI FREE!</h1>
        <p>Ciao, <strong id="usernameDisplay"></strong>!</p>
        <p>Sei loggato con l'email: <strong id="userEmail"></strong></p>
        <br>
        <button onclick="logout()">Logout</button>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // Questo script è il "guardiano" dell'app. Si attiva ogni volta che lo stato di autenticazione cambia.
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            const user = session?.user;

            if (!user) {
                // Se non c'è un utente (o ha fatto logout), rimanda sempre alla pagina di login.
                window.location.href = '/auth.html';
                return;
            }

            try {
                // Chiediamo al database il profilo completo dell'utente.
                const { data: profile, error } = await supabaseClient
                    .from('profiles')
                    .select('username, date_of_birth, avatar_url')
                    .eq('id', user.id)
                    .single(); // .single() ci dà un solo risultato o un errore.

                // Ignoriamo l'errore specifico che dice "nessuna riga trovata", perché è normale per un nuovo utente.
                if (error && error.code !== 'PGRST116') throw error; 

                // CONDIZIONE DI CONTROLLO: se il profilo non esiste, O non ha uno username, O non ha una data di nascita...
                if (!profile || !profile.username || !profile.date_of_birth) {
                    // ...allora reindirizziamo l'utente alla pagina di setup per fargli completare i dati.
                    window.location.href = '/setup-profile.html';
                } else {
                    // ALTRIMENTI, se il profilo è completo, nascondiamo il messaggio di caricamento e mostriamo la dashboard.
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('dashboardContent').style.display = 'block';
                    
                    // Popoliamo la pagina con i dati dell'utente.
                    document.getElementById('usernameDisplay').textContent = profile.username;
                    document.getElementById('userEmail').textContent = user.email;
                    // Mostriamo l'avatar o un placeholder se non è stato caricato.
                    document.getElementById('avatarDisplay').src = profile.avatar_url || 'https://placehold.co/100x100/121212/FFFFFF?text=??';
                }

            } catch (error) {
                // MODIFICA PER IL DEBUG: Mostra l'errore esatto sulla pagina
                console.error("Errore nel recupero del profilo:", error);
                const loadingDiv = document.getElementById('loadingState');
                loadingDiv.innerHTML = `
                    <div class="error-box">
                        <h1>Errore nel Caricamento</h1>
                        <p>Il database ha restituito un errore. Questo è quasi sempre causato da una regola di sicurezza (Policy) mancante.</p>
                        <hr style="margin: 15px 0; border-color: #444;">
                        <p><strong>Messaggio di Errore:</strong></p>
                        <p class="error-message">${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
