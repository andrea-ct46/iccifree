<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #00FF00; margin-bottom: 20px; }
        h1 { color: #00FF00; }
        p { font-size: 18px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #00FF00; border: none; font-weight: bold; border-radius: 8px;}
        .loading { font-size: 24px; }
        .error-box { max-width: 600px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 8px; border: 1px solid #ff4444; text-align: left; }
        .error-box p { font-size: 16px; }
        .error-message { color: #ff4444; font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>

    <div id="loadingState">
        <h1 class="loading">Verifica profilo in corso... (Attendere)</h1>
    </div>

    <div id="dashboardContent" style="display: none;">
        <img id="avatarDisplay" src="https://placehold.co/100x100/121212/FFFFFF?text=PIC" alt="Foto Profilo" class="profile-pic">
        <h1>Benvenuto su ICCI FREE!</h1>
        <p>Ciao, <strong id="usernameDisplay"></strong>!</p>
        <p>Sei loggato con l'email: <strong id="userEmail"></strong></p>
        <br>
        <button onclick="logout()">Logout</button>
    </div>

    <script src="/js/supabase.js"></script>
    <script>
        console.log("--- CHECKPOINT 1: Pagina caricata, script avviato. ---");

        // Timeout di sicurezza: se dopo 7 secondi non è successo nulla, mostra un errore.
        const safetyTimeout = setTimeout(() => {
            console.error("TIMEOUT: La risposta da Supabase sta impiegando troppo tempo.");
            const loadingDiv = document.getElementById('loadingState');
            loadingDiv.innerHTML = `
                <div class="error-box">
                    <h1>Timeout della Connessione</h1>
                    <p>Non è arrivata nessuna risposta dal server. Controlla la tua connessione a internet e verifica che l'URL del tuo progetto Supabase in <code>/js/supabase.js</code> sia corretto.</p>
                </div>
            `;
        }, 7000); // 7 secondi

        try {
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                clearTimeout(safetyTimeout); // Annulla il timeout, abbiamo ricevuto una risposta!
                console.log("--- CHECKPOINT 2: onAuthStateChange si è attivato. Evento:", event);
                
                const user = session?.user;

                if (!user) {
                    console.log("CHECKPOINT 3a: Nessun utente trovato. Reindirizzo a /auth.html");
                    window.location.href = '/auth.html';
                    return;
                }

                console.log("--- CHECKPOINT 3b: Utente trovato:", user.id);
                console.log("--- CHECKPOINT 4: Inizio richiesta al database per il profilo... ---");

                try {
                    const { data: profile, error } = await supabaseClient
                        .from('profiles')
                        .select('username, date_of_birth, avatar_url')
                        .eq('id', user.id)
                        .single();

                    console.log("--- CHECKPOINT 5: Risposta dal database ricevuta. ---", { profile, error });

                    if (error && error.code !== 'PGRST116') {
                        throw error; // Lancia l'errore al blocco catch qui sotto
                    }

                    if (!profile || !profile.username || !profile.date_of_birth) {
                        console.log("CHECKPOINT 6a: Profilo incompleto. Reindirizzo a /setup-profile.html");
                        window.location.href = '/setup-profile.html';
                    } else {
                        console.log("CHECKPOINT 6b: Profilo completo. Mostro la dashboard.");
                        document.getElementById('loadingState').style.display = 'none';
                        document.getElementById('dashboardContent').style.display = 'block';
                        document.getElementById('usernameDisplay').textContent = profile.username;
                        document.getElementById('userEmail').textContent = user.email;
                        document.getElementById('avatarDisplay').src = profile.avatar_url || 'https://placehold.co/100x100/121212/FFFFFF?text=??';
                    }

                } catch (dbError) {
                    console.error("--- ERRORE DATABASE nel CHECKPOINT 5 ---", dbError);
                    const loadingDiv = document.getElementById('loadingState');
                    loadingDiv.innerHTML = `
                        <div class="error-box">
                            <h1>Errore nel Caricamento del Profilo</h1>
                            <p>Il database ha restituito un errore. Questo è quasi sempre causato da una regola di sicurezza (Policy) mancante o errata sulla tabella <code>profiles</code>.</p>
                            <hr style="margin: 15px 0; border-color: #444;">
                            <p><strong>Messaggio di Errore:</strong></p>
                            <p class="error-message">${dbError.message}</p>
                        </div>
                    `;
                }
            });
        } catch (initError) {
             console.error("--- ERRORE GRAVE: Impossibile avviare onAuthStateChange ---", initError);
             clearTimeout(safetyTimeout);
             const loadingDiv = document.getElementById('loadingState');
             loadingDiv.innerHTML = `
                <div class="error-box">
                    <h1>Errore Critico</h1>
                    <p>Non è stato possibile inizializzare il client di Supabase. Controlla che il file <code>/js/supabase.js</code> sia caricato correttamente e non contenga errori.</p>
                </div>
             `;
        }
    </script>
</body>
</html>
