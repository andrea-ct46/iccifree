<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICCI FREE - Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <!-- Stato di caricamento -->
  <div id="loadingState" class="loading-screen">
    <p>Caricamento dashboard...</p>
  </div>

  <!-- Contenitore principale app -->
  <div id="appContainer" style="display:none; flex-direction: column; min-height: 100vh;">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-left">
        <img id="userAvatar" class="user-avatar" src="https://placehold.co/40x40" alt="Avatar">
        <a id="myProfileLink" href="/profile.html" class="profile-link">Il mio profilo</a>
      </div>
      <div class="header-right">
        <a href="/golive-webrtc.html" class="go-live-btn">🎥 GO LIVE</a>
      </div>
    </header>

    <!-- Contenuto principale -->
    <main class="dashboard-main">
      <h2>Dirette in corso</h2>
      <div id="streamGrid" class="stream-grid">
        <!-- Qui vengono caricate le live -->
      </div>
    </main>
  </div>

  <!-- Script -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/supabaseClient.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
</html>
