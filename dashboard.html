<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #00FF00; margin-bottom: 20px; }
        h1 { color: #00FF00; }
        p { font-size: 18px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #00FF00; border: none; font-weight: bold; border-radius: 8px;}
        .loading { font-size: 24px; }
    </style>
</head>
<body>

    <div id="loadingState">
        <h1 class="loading">Verifica profilo in corso...</h1>
    </div>

    <div id="dashboardContent" style="display: none;">
        <img id="avatarDisplay" src="https://placehold.co/100x100/121212/FFFFFF?text=PIC" alt="Foto Profilo" class="profile-pic">
        <h1>Benvenuto su ICCI FREE!</h1>
        <p>Ciao, <strong id="usernameDisplay"></strong>!</p>
        <p>Sei loggato con l'email: <strong id="userEmail"></strong></p>
        <br>
        <button onclick="logout()">Logout</button>
    </div>

    <script src="/js/supabase.js"></script>
    <script>
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            const user = session?.user;

            if (!user) {
                window.location.href = '/auth.html';
                return;
            }

            try {
                // Riportato allo standard 'profiles'
                const { data: profile, error } = await supabaseClient
                    .from('profiles') // <<<--- CORRETTO E STANDARDIZZATO
                    .select('username, date_of_birth, avatar_url')
                    .eq('id', user.id)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;

                if (!profile || !profile.username || !profile.date_of_birth) {
                    window.location.href = '/setup-profile.html';
                } else {
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('dashboardContent').style.display = 'block';
                    document.getElementById('usernameDisplay').textContent = profile.username;
                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('avatarDisplay').src = profile.avatar_url || 'https://placehold.co/100x100/121212/FFFFFF?text=??';
                }

            } catch (error) {
                console.error("Errore nel recupero del profilo:", error);
                document.getElementById('loadingState').innerHTML = `<h1>Errore nel caricamento del profilo.</h1><p>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
