<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Loading State -->
    <div id="loadingState">
        <div class="spinner"></div>
        <p class="loading-text">Caricamento dashboard...</p>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" style="display: none;">
        <!-- Header -->
        <header class="app-header">
            <div class="logo" onclick="location.href='/'">
                ICCI<span class="free">FREE</span>
            </div>
            
            <!-- Search Bar -->
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Cerca streamer o live..."
                    autocomplete="off"
                >
                <div class="search-results-dropdown" id="searchResults"></div>
            </div>
            
            <!-- Header Actions -->
            <div class="header-actions">
                <!-- GO LIVE Button -->
                <a href="/golive-webrtc.html" class="go-live-btn">
                    <span>🔴</span>
                    <span>GO LIVE</span>
                </a>
                
                <!-- Profile Menu -->
                <div class="profile-menu">
                    <img id="userAvatar" 
                         src="https://placehold.co/40x40/1a1a1a/FFFFFF?text=?" 
                         alt="User" 
                         class="user-avatar">
                    <div class="profile-dropdown">
                        <a href="#" id="myProfileLink">👤 Il mio Profilo</a>
                        <a href="/edit-profile.html">✏️ Modifica Profilo</a>
                        <a href="#" onclick="logout()">🚪 Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h3>📂 Categorie</h3>
                <ul class="category-list">
                    <li><a href="#" onclick="filterByCategory('all')">🔥 Tutti</a></li>
                    <li><a href="#" onclick="filterByCategory('Talk Show')">💬 Talk Show</a></li>
                    <li><a href="#" onclick="filterByCategory('Gaming')">🎮 Gaming</a></li>
                    <li><a href="#" onclick="filterByCategory('Music')">🎵 Musica</a></li>
                    <li><a href="#" onclick="filterByCategory('Art')">🎨 Arte</a></li>
                    <li><a href="#" onclick="filterByCategory('Cooking')">🍳 Cucina</a></li>
                    <li><a href="#" onclick="filterByCategory('Sports')">⚽ Sport</a></li>
                    <li><a href="#" onclick="filterByCategory('IRL')">🌍 IRL</a></li>
                </ul>
            </aside>

            <!-- Feed Container -->
            <section class="feed-container">
                <h2>🔥 Stream Live</h2>
                <div class="stream-grid" id="streamGrid">
                    <!-- Stream cards will be inserted here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/dashboard.js"></script>
    
    <!-- Inline filter function -->
    <script>
        async function filterByCategory(category) {
            const streamGrid = document.getElementById('streamGrid');
            if (!streamGrid) return;
            
            streamGrid.innerHTML = '<div style="text-align: center;">Caricamento...</div>';
            
            try {
                let query = supabaseClient
                    .from('streams')
                    .select(`
                        *,
                        profiles!user_id (
                            username,
                            avatar_url
                        )
                    `)
                    .eq('status', 'live');
                
                if (category !== 'all') {
                    query = query.eq('category', category);
                }
                
                const { data: streams, error } = await query;
                
                if (error) throw error;
                
                if (!streams || streams.length === 0) {
                    streamGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #888;">
                            <p style="font-size: 48px;">📺</p>
                            <h3>Nessuna diretta ${category !== 'all' ? 'in ' + category : ''}</h3>
                            <a href="/golive-webrtc.html" class="btn btn-primary">GO LIVE ORA</a>
                        </div>
                    `;
                    return;
                }
                
                window.loadStreams(); // Use existing function
                
            } catch (error) {
                console.error('Filter error:', error);
            }
        }
    </script>
</body>
</html>
