<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Utente - ICCI FREE</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
    <!-- Header condiviso (potrebbe diventare un componente in futuro) -->
    <header class="app-header">
        <a href="/dashboard.html" class="logo-link">
            <div class="logo">ICCI<span class="free">FREE</span></div>
        </a>
        <div class="header-actions">
            <!-- Questo si popolerà dinamicamente -->
            <a href="#" id="headerActionBtn" style="display: none;"></a>
        </div>
    </header>

    <!-- Contenitore principale -->
    <main id="profileContainer" style="display: none;">
        <div class="profile-header">
            <div class="profile-avatar">
                <img id="profileAvatar" src="https://placehold.co/150x150/1a1a1a/FFFFFF?text=?" alt="Avatar utente">
            </div>
            <div class="profile-info">
                <h1 id="profileUsername"></h1>
                <div class="profile-stats">
                    <div class="stat"><strong>0</strong> Streams</div>
                    <div class="stat"><strong id="followersCount">0</strong> Followers</div>
                    <div class="stat"><strong id="followingCount">0</strong> Following</div>
                </div>
                <p id="profileBio"></p>
                <div class="profile-actions" id="profileActions">
                    <!-- Pulsanti Follow/Edit verranno inseriti qui -->
                </div>
            </div>
        </div>

        <div class="profile-content">
            <div class="content-tabs">
                <button class="tab active">Streams Recenti</button>
                <button class="tab">Clips</button>
            </div>
            <div class="content-grid">
                <p id="noContentMessage">Nessun contenuto da mostrare.</p>
            </div>
        </div>
    </main>

    <!-- Stato di caricamento o errore -->
    <div id="messageState" class="message-container">
        <div class="spinner"></div>
        <p id="messageText">Caricamento profilo...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
