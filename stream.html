<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE - ICCI FREE</title>
    <link rel="stylesheet" href="/css/stream.css">
</head>
<body>
    <div id="loadingState">
        <div class="spinner"></div>
        <p class="loading-text">Caricamento della diretta...</p>
    </div>

    <div id="streamPageContainer" style="display: none;">
        <div class="video-container">
            <div class="video-player">
                <!-- MODIFICA #1: Sostituito l'img placeholder con un vero elemento <video> -->
                <video id="streamVideo" autoplay playsinline muted></video>
            </div>
            
            <!-- Controlli visibili solo allo streamer -->
            <div id="streamerControls" class="streamer-controls" style="display: none;">
                <button id="endStreamBtn" class="end-stream-button">Termina Diretta</button>
            </div>
            
            <!-- MODIFICA #2: Aggiunto un pulsante per tornare indietro per gli spettatori -->
            <a href="/dashboard.html" id="backToDashboardBtn" class="back-button" style="display: none;">
                &larr; Torna alla Dashboard
            </a>
            
            <div class="stream-info-bar">
                <div class="streamer-info">
                    <img id="streamerAvatar" src="https://placehold.co/50x50/181818/A0A0A0?text=?" alt="Streamer Avatar" class="streamer-avatar">
                    <div>
                        <h1 id="streamTitle">Titolo della diretta...</h1>
                        <p id="streamerName">Nome streamer...</p>
                    </div>
                </div>
                <div class="stream-actions">
                    <button id="followBtn" class="follow-button">Segui</button>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <header class="chat-header">
                <h3>CHAT DELLA DIRETTA</h3>
            </header>
            <div class="chat-messages" id="chatMessages">
                <!-- I messaggi della chat verranno inseriti qui da JS -->
            </div>
            <footer class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Invia un messaggio...">
                <button id="sendMessageBtn" class="send-message-btn">Invia</button>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/following.js"></script>
    <script src="/js/stream.js"></script>
</body>
</html>
