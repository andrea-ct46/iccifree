<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Login / Sign Up</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #00FF00;
            --dark-green: #00CC00;
            --black: #000000;
            --dark-gray: #0a0a0a;
            --gray: #1a1a1a;
            --light-gray: #888;
            --white: #FFFFFF;
            --error: #ff4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 0, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--dark-gray);
            border: 2px solid var(--primary-green);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 255, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .logo .icci {
            color: var(--white);
        }

        .logo .free {
            color: var(--primary-green);
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .tagline {
            text-align: center;
            color: var(--light-gray);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--gray);
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--light-gray);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary-green);
            border-bottom-color: var(--primary-green);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--light-gray);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--black);
            border: 2px solid var(--gray);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .form-input::placeholder {
            color: var(--light-gray);
        }

        .username-check {
            font-size: 12px;
            margin-top: 5px;
            color: var(--light-gray);
        }

        .username-check.available {
            color: var(--primary-green);
        }

        .username-check.taken {
            color: var(--error);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
            border: none;
            border-radius: 10px;
            color: var(--black);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gray);
        }

        .divider span {
            position: relative;
            background: var(--dark-gray);
            padding: 0 15px;
            color: var(--light-gray);
            font-size: 14px;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--gray);
            border: 2px solid var(--gray);
            border-radius: 10px;
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .social-btn:hover {
            border-color: var(--primary-green);
            background: rgba(0, 255, 0, 0.1);
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--light-gray);
        }

        .footer-link a {
            color: var(--primary-green);
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary-green);
        }

        .loading.show {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gray);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
    </style>
</head>
<body>

        <!-- Tabs -->
        <div class="tabs">

        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Login Form -->

                    </svg>
                    Discord
                </button>
            </div>

            <div class="footer-link">
                <a href="#" onclick="showForgotPassword()">Forgot password?</a>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="signupUsername" placeholder="coolstreamer123" required>
                <div class="username-check" id="usernameCheck"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="signupEmail" placeholder="your@email.com" required>

            <div class="form-group">

                <input type="password" class="form-input" id="signupPassword" placeholder="Min 8 characters" required minlength="8">

        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE SUPABASE - METTI LE TUE CHIAVI QUI!
        const SUPABASE_URL = 'https://tuocodice.supabase.co'; // CAMBIA QUESTO
        const SUPABASE_ANON_KEY = 'eyJ...'; // CAMBIA QUESTO
        
        // Inizializza Supabase
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Switch tabs
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            }
            
            hideMessages();
        }

        // Show/hide messages
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
            setTimeout(() => successEl.classList.remove('show'), 5000);
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        // Check username availability
        let usernameTimeout;
        document.getElementById('signupUsername').addEventListener('input', (e) => {
            clearTimeout(usernameTimeout);
            const username = e.target.value;
            const checkEl = document.getElementById('usernameCheck');
            
            if (username.length < 3) {
                checkEl.textContent = 'Username must be at least 3 characters';
                checkEl.className = 'username-check';
                return;
            }
            
            checkEl.textContent = 'Checking...';
            checkEl.className = 'username-check';
            
            usernameTimeout = setTimeout(async () => {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('username')
                    .eq('username', username)
                    .single();
                
                if (error && error.code === 'PGRST116') {
                    checkEl.textContent = '✓ Username available!';
                    checkEl.className = 'username-check available';
                } else {
                    checkEl.textContent = '✗ Username already taken';
                    checkEl.className = 'username-check taken';
                }
            }, 500);
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoading(true);
            hideMessages();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });
            
            showLoading(false);
            
            if (error) {
                showError(error.message);
            } else {
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href
