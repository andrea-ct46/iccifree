<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCI FREE - Join Now</title>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* CSS Invariato... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #00FF00;
            --dark-green: #00AA00;
            --black: #000000;
            --gray: #1a1a1a;
            --light-gray: #888;
            --white: #FFFFFF;
            --error: #ff4444;
            --google: #4285F4;
            --discord: #5865F2;
            --github: #333;
            --tiktok: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #000 0%, #0a0a0a 100%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,255,0,0.05) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--green);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 0 100px rgba(0,255,0,0.1),
                0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Glow effect */
        .auth-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--green), transparent, var(--green));
            border-radius: 24px;
            opacity: 0;
            animation: glow 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glow {
            50% { opacity: 0.3; }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeInDown 0.6s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 8px;
        }

        .logo .icci {
            color: var(--white);
            text-shadow: 0 2px 10px rgba(255,255,255,0.3);
        }

        .logo .free {
            color: var(--green);
            text-shadow: 0 0 30px var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            50% { text-shadow: 0 0 40px var(--green), 0 0 60px var(--green); }
        }

        .tagline {
            color: var(--light-gray);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--black);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
            position: relative;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--light-gray);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
            z-index: 2;
        }

        .tab.active {
            color: var(--black);
        }

        .tab-indicator {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: var(--green);
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .tab-indicator.signup {
            transform: translateX(calc(100% + 4px));
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--light-gray);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--black);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--white);
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--green);
            background: rgba(0,255,0,0.03);
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }

        .form-input::placeholder {
            color: #555;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--green), var(--dark-green));
            border: none;
            border-radius: 12px;
            color: var(--black);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,0,0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Divider */
        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 30px);
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gray));
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
            background: linear-gradient(90deg, var(--gray), transparent);
        }

        .divider span {
            background: rgba(26, 26, 26, 0.95);
            padding: 0 15px;
            color: var(--light-gray);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Social Buttons */
        .social-login {
            display: grid;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            background: var(--gray);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--white);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            border-color: var(--green);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .social-btn.google:hover {
            border-color: var(--google);
            background: rgba(66, 133, 244, 0.1);
        }

        .social-btn.discord:hover {
            border-color: var(--discord);
            background: rgba(88, 101, 242, 0.1);
        }

        .social-btn.github:hover {
            border-color: var(--white);
            background: rgba(255, 255, 255, 0.05);
        }

        .social-btn.tiktok:hover {
            border-color: #ff0050;
            background: rgba(255, 0, 80, 0.1);
        }

        /* Messages */
        .message {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.show {
            display: block;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--light-gray);
        }

        .footer-text a {
            color: var(--green);
            text-decoration: none;
            transition: all 0.3s;
        }

        .footer-text a:hover {
            text-decoration: underline;
            text-shadow: 0 0 10px var(--green);
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .auth-container {
                padding: 32px 24px;
            }
            
            .logo h1 {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <!-- Logo -->
        <div class="logo">
            <h1>
                <span class="icci">ICCI</span><span class="free">FREE</span>
            </h1>
            <p class="tagline">Speak Your Mind</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            <div class="tab-indicator" id="tabIndicator"></div>
        </div>

        <!-- Messages -->
        <div class="message error-message" id="errorMessage"></div>
        <div class="message success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input 
                    type="email" 
                    class="form-input" 
                    id="loginEmail" 
                    placeholder="enter@email.com" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="loginPassword" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <button type="submit" class="submit-btn">
                Login to ICCI FREE
            </button>

            <div class="divider">
                <span>Or</span>
            </div>

                </button>

                <button type="button" class="social-btn tiktok" onclick="signInWithTikTok()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>

            </div>

            <div class="footer-text">
                <a href="#" onclick="showForgotPassword()">Forgot password?</a>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display: none;">
            <!-- ... (contenuto invariato) ... -->
        </form>
    </div>

    <!-- I NOSTRI SCRIPT (IN QUEST'ORDINE!) -->
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
